<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mom's Kitchen - Exclusive Menu</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap');

        :root {
            --gold: #d4af37;
            --dark: #1a1a1a;
            --light: #f4f4f4;
            --red: #c0392b;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #fffdf5; /* Creamish premium background */
            margin: 0;
            color: var(--dark);
        }

        header {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        /* 3D Animated Title */
        h1 {
            font-size: 3.5rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin: 0;
            color: var(--gold);
            text-shadow: 4px 4px 0px rgba(0,0,0,0.5);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .menu-container {
            max-width: 800px;
            margin: -50px auto 50px auto;
            padding: 20px;
            background: white;
            border-radius: 20px 20px 0 0;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.1);
        }

        .category-title {
            text-align: center;
            font-size: 1.8rem;
            color: var(--red);
            border-bottom: 2px solid var(--gold);
            display: inline-block;
            margin: 40px auto 20px;
            width: 100%;
            padding-bottom: 10px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .item-card {
            background: #fff;
            border: 1px solid #eee;
            border-radius: 15px;
            padding: 15px;
            display: flex;
            align-items: center;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .item-card:hover {
            transform: translateY(-5px);
            border-color: var(--gold);
        }

        .item-img {
            width: 90px;
            height: 90px;
            border-radius: 10px;
            object-fit: cover;
            margin-right: 15px;
        }

        .item-info h3 {
            margin: 0;
            font-size: 1.1rem;
        }

        .price {
            color: var(--red);
            font-weight: 800;
            margin-top: 5px;
            display: block;
        }
    </style>
</head>
<body>

    <header>
        <h1>Mom's Kitchen</h1>
        <p>Fine Dining Experience</p>
    </header>

    <div class="menu-container">
        
        <h2 class="category-title">🥟 Pakoda Special</h2>
        <div class="menu-grid">
            <div class="item-card">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Paneer_Pakora.jpg/320px-Paneer_Pakora.jpg" class="item-img" alt="Pakoda">
                <div class="item-info">
                    <h3>Paneer Pakoda</h3>
                    <span class="price">₹149</span>
                </div>
            </div>
            <!-- Aur items aise hi add karein -->
        </div>

    </div>

</body>
</html>
